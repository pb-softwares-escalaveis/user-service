volumes:
    user-service-db-volume:
    keycloak-data-volume:

services:
  eureka-server:
    container_name: eureka-server
    image: steeltoeoss/eureka-server:latest
    ports:
      - "8761:8761"
    networks:
      - leilao-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  user-service-db:
    container_name: user-service-db
    image: postgres:17-alpine3.23
    volumes:
      - user-service-db-volume:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    environment:
      POSTGRES_USER: ${USER_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
      POSTGRES_DB: userservicedb
    ports:
      - "${USER_SERVICE_DB_PORT}:5432"
    networks:
        - leilao-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d userservicedb -U ${USER_SERVICE_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.6.2
    volumes:
      - keycloak-data-volume:/opt/keycloak/data
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://user-service-db:5432/keycloakdb
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_PROXY: edge
      KC_FRONTEND_URL: ${KEYCLOAK_EXTERNAL_URL}
      KC_DB_USERNAME: ${USER_SERVICE_DB_USER}
      KC_DB_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
      KC_HEALTH_ENABLED: true
    ports:
      - "${KEYCLOAK_PORT}:8080"
    command: start-dev --import-realm
    networks:
        - leilao-network
    depends_on:
      user-service-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "cat /dev/null > /dev/tcp/127.0.0.1/8080 || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 15

  user-service:
    container_name: user-service
    image: shyuu7/user-service:latest
    restart: always
    ports:
      - "${USER_SERVICE_PORT}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-service-db:5432/userservicedb
      SPRING_DATASOURCE_USERNAME: ${USER_SERVICE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_CLIENT_SECRET_USER_SERVICE: ${KEYCLOAK_CLIENT_SECRET_USER_SERVICE}
      S3_ENDPOINT: ${S3_ENDPOINT}
      USER_SERVICE_S3_BUCKET_NAME: ${USER_SERVICE_S3_BUCKET_NAME}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      SPRING_DATA_REDIS_HOST: ${USER_SERVICE_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${USER_SERVICE_REDIS_PORT}
      SPRING_DATA_REDIS_REPOSITORIES_ENABLED: false
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      LOGSTASH_HOST: ${LOGSTASH_HOST}
      LOGSTASH_PORT: ${LOGSTASH_PORT}
    networks:
      - leilao-network
    depends_on:
      user-service-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      user-service-redis:
        condition: service_healthy

  user-service-redis:
    image: redis:8.8.0-alpine
    container_name: user-service-redis
    ports:
      - "${USER_SERVICE_REDIS_PORT}:6379"
    networks:
      - leilao-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  leilao-network:
    external: true