spring:
  application:
    name: user-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: UserServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      repositories:
        enabled: false

  flyway:
    enabled: true
    default-schema: usuarios
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_SERVER_URL}/realms/leilao-service

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm: leilao-service
  client-id: user-service-client
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

s3:
  endpoint: ${S3_ENDPOINT}
  bucket-name: ${S3_BUCKET_NAME}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}

