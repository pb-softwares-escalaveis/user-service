spring:
  application:
    name: user-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      repositories:
        enabled: false

  flyway:
    enabled: true
    default-schema: usuarios
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_SERVER_URL}/realms/leilao-service

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}/eureka
    register-with-eureka: true
    fetch-registry: false
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: User Service do O Leiloeiro Online

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm: leilao-service
  client-id: user-service-client
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

s3:
  endpoint: ${S3_ENDPOINT}
  bucket-name: ${S3_BUCKET_NAME}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}