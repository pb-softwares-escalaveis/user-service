spring:
  application:
    name: user-service

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS usuarios
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: true

  cache:
    type: none
  data:
    redis:
      repositories:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisHealthContributorAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration

  flyway:
    enabled: true
    schemas: usuarios
    clean-disabled: false
    locations: classpath:db/migration-h2

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: User Service do O Leiloeiro Online

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  bucket-name: ${S3_BUCKET_NAME:test-bucket}
  access-key: ${S3_ACCESS_KEY:test}
  secret-key: ${S3_SECRET_KEY:test}

logging:
  level:
    com.br.infnet.userservice: DEBUG
    org.springframework.kafka: INFO
    org.springframework.web: DEBUG
    org.springframework.security: WARN